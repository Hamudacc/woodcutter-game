<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나무꾼 게임</title>
</head>
<body>
    <h1>나무꾼의 방</h1>
    <p>나무 개수: <span id="woodCount">0</span></p>
    <button id="woodButton">나무 채집하기</button>

    <script>
        let wood = 0;
        document.getElementById('woodButton').onclick = function() {
            wood = wood + 1;
            document.getElementById('woodCount').innerText = wood;
        };
    </script>
</body>
</html>
