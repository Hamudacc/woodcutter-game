<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나무꾼 게임</title>
</head>
<body>
    <h1>숲</h1>
    <p>나무 개수: <span id="woodCount">0</span></p>
    <button id="woodButton">도끼질 하기</button>
  <p>일꾼 수: <span id="workerCount">0</span>명</p>
<button id="hireButton">일꾼 고용하기 (나무 10개 소모)</button>

    <h3>활동 로그</h3>
    <div id="logArea" style="height: 150px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px;"></div>

    <script>
    let wood = 0;
    let workers = 0;
    let workerCost = 10; // 초기 고용 비용

    function addLog(message) {
        const logArea = document.getElementById('logArea');
        const newMessage = document.createElement('p');
        newMessage.innerText = message;
        logArea.prepend(newMessage);
    }

    // 도끼질 버튼 (기존과 동일)
    document.getElementById('woodButton').onclick = function() {
        wood++;
        document.getElementById('woodCount').innerText = wood;
    };

    // 일꾼 고용 버튼 (비용 증가 로직 추가)
    document.getElementById('hireButton').onclick = function() {
        if (wood >= workerCost) { // 고정된 10 대신 변수 사용
            wood -= workerCost;
            workers++;
            
            // 비용을 1.5배로 늘리거나(Math.floor는 정수로 만들기 위해 사용), 
            // 원하는 공식을 넣으세요. 여기선 1.5배 증가 예시입니다.
            workerCost = Math.floor(workerCost * 2.1); 
            
            // 화면 업데이트
            document.getElementById('woodCount').innerText = wood;
            document.getElementById('workerCount').innerText = workers;
            document.getElementById('hireButton').innerText = "일꾼 고용하기 (나무 " + workerCost + "개 소모)";
            
            addLog("일꾼을 고용했습니다. 다음 고용 비용: " + workerCost);
        } else {
            addLog("나무가 부족합니다! (필요: " + workerCost + ")");
        }
    };

    // 자동 생산 루프
    setInterval(function() {
        if (workers > 0) {
            wood += workers;
            document.getElementById('woodCount').innerText = wood;
        }
    }, 1000);
</script>
</body>
</html>
